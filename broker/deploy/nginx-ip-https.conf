limit_req_zone $binary_remote_addr zone=broker_api:10m rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name 139.224.211.170;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 139.224.211.170;

    ssl_certificate /etc/letsencrypt/live/139.224.211.170/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/139.224.211.170/privkey.pem;

    location / {
        client_max_body_size 1m;
        limit_req zone=broker_api burst=60 nodelay;
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 240s;
        proxy_send_timeout 240s;
    }
}
